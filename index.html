`html
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup Gods 2026</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: #0a0f0a;
    --card: #1a221a;
    --gold: #ffd700;
    --red: #ff4444;
    --text: #e0e0e0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    padding: 12px;
    min-height: 100vh;
  }
  h1 {
    text-align: center;
    color: var(--gold);
    font-size: 20px;
    margin: 8px 0 16px;
    text-shadow: 0 0 20px rgba(255,215,0,0.3);
  }
  .group-title {
    color: var(--gold);
    font-size: 13px;
    font-weight: bold;
    margin: 16px 0 6px 4px;
    opacity: 0.8;
    letter-spacing: 1px;
  }
  .group-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 4px;
  }
  .card {
    background: var(--card);
    border-radius: 12px;
    padding: 10px 6px;
    text-align: center;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    border: 1px solid transparent;
  }
  .card:active {
    transform: scale(0.95);
    box-shadow: 0 0 12px rgba(255,215,0,0.25);
    border-color: var(--gold);
  }
  .card .flag {
    font-size: 32px;
    line-height: 1.2;
    display: block;
  }
  .card .name {
    font-size: 10px;
    margin: 4px 0;
  }
  .card .counters {
    font-size: 10px;
    display: flex;
    justify-content: center;
    gap: 8px;
  }
  .gold { color: var(--gold); }
  .red { color: var(--red); }

  /* Экран команды */
  #detail {
    display: none;
    text-align: center;
    padding: 20px 10px;
  }
  #detail .back {
    color: var(--gold);
    text-decoration: underline;
    display: block;
    margin-bottom: 20px;
    font-size: 14px;
    cursor: pointer;
  }
  #detail .big-flag {
    font-size: 80px;
    display: block;
    margin: 10px 0;
  }
  #detail .big-name {
    font-size: 22px;
    font-weight: bold;
    margin: 8px 0;
  }
  #detail .big-counters {
    font-size: 18px;
    margin: 16px 0;
    display: flex;
    justify-content: center;
    gap: 30px;
  }
  .btn {
    display: block;
    width: 100%;
    max-width: 300px;
    margin: 8px auto;
    padding: 14px;
    border: none;
border-radius: 12px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn:active { opacity: 0.8; }
  .btn-bless {
    background: linear-gradient(135deg, #ffd700, #b8860b);
    color: #000;
  }
  .btn-curse {
    background: linear-gradient(135deg, #8b0000, #4a0000);
    color: #fff;
  }
</style>
</head>
<body>

<div id="home">
  <h1>⚽️ WORLD CUP GODS 2026</h1>
  <div id="all-groups"></div>
</div>

<div id="detail">
  <span class="back" onclick="closeDetail()">← Назад ко всем группам</span>
  <span class="big-flag" id="dflag"></span>
  <div class="big-name" id="dname"></div>
  <div class="big-counters">
    <span class="gold">🙏 <b id="dbless">0</b></span>
    <span class="red">🧿 <b id="dcurse">0</b></span>
  </div>
  <button class="btn btn-bless" onclick="pay('bless')">🙏 БЛАГОСЛОВИТЬ (10 ⭐️)</button>
  <button class="btn btn-curse" onclick="pay('curse')">🧿 ПРОКЛЯСТЬ (20 ⭐️)</button>
</div>

<script>
// Все 48 команд сгруппированы по группам A-L
const GROUPS = {
  'A': [
    {code:'mx', name:'Мексика', flag:'🇲🇽'},
    {code:'za', name:'ЮАР', flag:'🇿🇦'},
    {code:'kr', name:'Южная Корея', flag:'🇰🇷'},
    {code:'cz', name:'Чехия', flag:'🇨🇿'}
  ],
  'B': [
    {code:'ca', name:'Канада', flag:'🇨🇦'},
    {code:'ba', name:'Босния и Герц.', flag:'🇧🇦'},
    {code:'qa', name:'Катар', flag:'🇶🇦'},
    {code:'ch', name:'Швейцария', flag:'🇨🇭'}
  ],
  'C': [
    {code:'br', name:'Бразилия', flag:'🇧🇷'},
    {code:'ma', name:'Марокко', flag:'🇲🇦'},
    {code:'ht', name:'Гаити', flag:'🇭🇹'},
    {code:'gb-sct', name:'Шотландия', flag:'🏴󠁧󠁢󠁳󠁣󠁴󠁿'}
  ],
  'D': [
    {code:'us', name:'США', flag:'🇺🇸'},
    {code:'py', name:'Парагвай', flag:'🇵🇾'},
    {code:'au', name:'Австралия', flag:'🇦🇺'},
    {code:'tr', name:'Турция', flag:'🇹🇷'}
  ],
  'E': [
    {code:'de', name:'Германия', flag:'🇩🇪'},
    {code:'cw', name:'Кюрасао', flag:'🇨🇼'},
    {code:'ci', name:'Кот-д\'Ивуар', flag:'🇨🇮'},
    {code:'ec', name:'Эквадор', flag:'🇪🇨'}
  ],
  'F': [
    {code:'nl', name:'Нидерланды', flag:'🇳🇱'},
    {code:'jp', name:'Япония', flag:'🇯🇵'},
    {code:'se', name:'Швеция', flag:'🇸🇪'},
    {code:'tn', name:'Тунис', flag:'🇹🇳'}
  ],
  'G': [
    {code:'be', name:'Бельгия', flag:'🇧🇪'},
    {code:'eg', name:'Египет', flag:'🇪🇬'},
    {code:'ir', name:'Иран', flag:'🇮🇷'},
    {code:'nz', name:'Новая Зеландия', flag:'🇳🇿'}
  ],
  'H': [
    {code:'es', name:'Испания', flag:'🇪🇸'},
    {code:'cv', name:'Кабо-Верде', flag:'🇨🇻'},
    {code:'sa', name:'Сауд. Аравия', flag:'🇸🇦'},
    {code:'uy', name:'Уругвай', flag:'🇺🇾'}
  ],
  'I': [
    {code:'fr', name:'Франция', flag:'🇫🇷'},
    {code:'sn', name:'Сенегал', flag:'🇸🇳'},
    {code:'iq', name:'Ирак', flag:'🇮🇶'},
    {code:'no', name:'Норвегия', flag:'🇳🇴'}
  ],
  'J': [
    {code:'ar', name:'Аргентина', flag:'🇦🇷'},
    {code:'dz', name:'Алжир', flag:'🇩🇿'},
    {code:'at', name:'Австрия', flag:'🇦🇹'},
    {code:'jo', name:'Иордания', flag:'🇯🇴'}
  ],
  'K': [
    {code:'pt', name:'Португалия', flag:'🇵🇹'},
    {code:'cd', name:'ДР Конго', flag:'🇨🇩'},
    {code:'uz', name:'Узбекистан', flag:'🇺🇿'},
    {code:'co', name:'Колумбия', flag:'🇨🇴'}
  ],
  'L': [
    {code:'gb-eng', name:'Англия', flag:'🏴󠁧󠁢󠁥󠁮󠁧󠁿'},
    {code:'hr', name:'Хорватия', flag:'🇭🇷'},
    {code:'gh', name:'Гана', flag:'🇬🇭'},
    {code:'pa', name:'Панама', flag:'🇵🇦'}
  ]
};

const GROUP_NAMES = {
  'A':'Группа A', 'B':'Группа B', 'C':'Группа C', 'D':'Группа D',
  'E':'Группа E', 'F':'Группа F', 'G':'Группа G', 'H':'Группа H',
  'I':'Группа I', 'J':'Группа J', 'K':'Группа K', 'L':'Группа L'
};

// Счетчики для каждой команды: ключ = group-code (напр, "A-mx")
let stats = {};
let currentGroup = null;
let currentCode = null;

// Инициализация счетчиков нулями
function initStats() {
  for (const [group, teams] of Object.entries(GROUPS)) {
    for (const team of teams) {
      const key = ${group}-${team.code};
      if (!stats[key]) stats[key] = { bless: 0, curse: 0 };
    }
  }
}
async function loadStats() {
  try {
    const res = await fetch('https://script.google.com/macros/s/AKfycbzY0fSC6xSD47ylmr8XUfdREWVJHKWUZA0FqIzJjxWYmDOIaKTqiwdZqviyzSKONi07/exec');
    if (res.ok) {
      const data = await res.json();
      if (data && typeof data === 'object') {
        // Сливаем загруженные данные с локальными
        for (const [key, val] of Object.entries(data)) {
          if (stats[key] !== undefined) {
            stats[key] = val;
          }
        }
      }
    }
  } catch(e) {
    console.log('Загружаем локальные счетчики');
  }
  renderAll();
}

function renderAll() {
  const container = document.getElementById('all-groups');
  let html = '';
  for (const [group, teams] of Object.entries(GROUPS)) {
    html += <div class="group-title">${GROUP_NAMES[group]}</div>;
    html += <div class="group-grid">;
    for (const team of teams) {
      const key = ${group}-${team.code};
      const s = stats[key] || { bless: 0, curse: 0 };
      html += 
        <div class="card" onclick="openDetail('${group}', '${team.code}')">
          <span class="flag">${team.flag}</span>
          <div class="name">${team.name}</div>
          <div class="counters">
            <span class="gold">🙏${s.bless}</span>
            <span class="red">🧿${s.curse}</span>
          </div>
        </div>;
    }
    html += </div>;
  }
  container.innerHTML = html;
}

function openDetail(group, code) {
  currentGroup = group;
  currentCode = code;
  document.getElementById('home').style.display = 'none';
  document.getElementById('detail').style.display = 'block';
  updateDetail();
}

function closeDetail() {
  document.getElementById('home').style.display = 'block';
  document.getElementById('detail').style.display = 'none';
}

function getTeam(group, code) {
  return GROUPS[group].find(t => t.code === code);
}

function updateDetail() {
  const team = getTeam(currentGroup, currentCode);
  const key = ${currentGroup}-${currentCode};
  const s = stats[key] || { bless: 0, curse: 0 };
  document.getElementById('dflag').textContent = team.flag;
  document.getElementById('dname').textContent = team.name;
  document.getElementById('dbless').textContent = s.bless;
  document.getElementById('dcurse').textContent = s.curse;
}

function pay(type) {
  const team = getTeam(currentGroup, currentCode);
  const title = type === 'bless'
    ? 🙏 Благословение ${team.name}
    : 🧿 Проклятие ${team.name};
  const description = type === 'bless'
    ? 'Увеличить Силу сборной'
    : 'Наложить Порчу на сборную';
  const amount = type === 'bless' ? 10 : 20;
  const payload = ${currentGroup}-${currentCode}_${type};

  Telegram.WebApp.openInvoice({
    title: title,
    description: description,
    payload: payload,
    provider_token: '',
    currency: 'XTR',
    prices: [{ label: title, amount: amount }]
  }, (status) => {
    if (status === 'paid') {
      const key = ${currentGroup}-${currentCode};
      if (!stats[key]) stats[key] = { bless: 0, curse: 0 };
      stats[key][type]++;
      updateDetail();
      renderAll();
    }
  });
}
initStats();
loadStats();
setInterval(loadStats, 15000);
</script>
</body>
</html>
`
