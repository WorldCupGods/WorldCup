html<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup Gods</title>
<script src="telegram.org"></script>
<style>
  body { margin:0; padding:10px; background:#0a0f0a; color:white; font-family:system-ui; user-select: none; }
  h1 { text-align:center; color:#ffd700; font-size:18px; margin:10px 0; }
  .grid { display:grid; grid-template-columns: repeat(3, 1fr); gap:8px; } /* Оптимально для телефонов */
  .card { background:#1a1f1a; border-radius:10px; padding:8px; text-align:center; cursor:pointer; border: 1px solid #222; }
  .card img { width:40px; height:30px; border-radius:3px; object-fit: cover; }
  .card .name { font-size:11px; margin:5px 0; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }
  .counters { font-size:10px; display: flex; justify-content: space-around; }
  .gold { color:#ffd700; }
  .red { color:#ff4444; }
  button { width:100%; padding:12px; border:none; border-radius:8px; margin:8px 0; font-weight:bold; cursor:pointer; }
  .bless { background:#ffd700; color:#000; }
  .curse { background:#8b0000; color:#fff; }
  .detail { display:none; padding:20px; text-align:center; }
  .back { color:#ffd700; text-decoration:underline; margin-bottom:20px; display:block; cursor:pointer; }
</style>
</head>
<body>

<div id="home">
  <h1>⚽️ WORLD CUP GODS</h1>
  <div class="grid" id="grid">Загрузка данных...</div>
</div>

<div id="detail" class="detail">
  <a class="back" onclick="closeDetail()">← Назад</a>
  <img id="dflag" src="" width="120" style="border-radius:5px;"><br>
  <h2 id="dname" style="font-size:24px; margin:15px 0;"></h2>
  <div style="margin:20px 0; background: #1a1f1a; padding: 15px; border-radius:10px;">
    <span class="gold">🙏 Благословений: <b id="dbless">0</b></span><br><br>
    <span class="red">🧿 Проклятий: <b id="dcurse">0</b></span>
  </div>
  <button class="bless" onclick="pay('bless')">🙏 БЛАГОСЛОВИТЬ (10 ⭐️)</button>
  <button class="curse" onclick="pay('curse')">🧿 ПРОКЛЯСТЬ (20 ⭐️)</button>
</div>

<script>
// Инициализация Telegram WebApp
if (window.Telegram && window.Telegram.WebApp) {
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
}

const TEAMS = [
  "Аргентина","Бразилия","Мексика","Франция","Англия","Германия",
  "Испания","Португалия","Италия","Нидерланды","Бельгия","Хорватия",
  "Марокко","Япония","Корея","Сенегал","Гана","Нигерия",
  "Камерун","Тунис","Египет","Сауд.Аравия","Иран","Катар",
  "Австралия","Н.Зеландия","США","Канада","Коста-Рика","Ямайка",
  "Уругвай","Колумбия","Чили","Перу","Эквадор","Парагвай",
  "Венесуэла","Боливия","Швейцария","Австрия","Сербия","Дания",
  "Швеция","Норвегия","Польша","Украина","Венгрия","Турция"
];

// Массив CODES восстановлен и синхронизирован
const CODES = ["ar","br","mx","fr","gb","de","es","pt","it","nl","be","hr",
               "ma","jp","kr","sn","gh","ng","cm","tn","eg","sa","ir","qa",
               "au","nz","us","ca","cr","jm","uy","co","cl","pe","ec","py",
               "ve","bo","ch","at","rs","dk","se","no","pl","ua","hu","tr"];

// Надежный CDN источник для загрузки SVG флагов
const FLAGS = (code) => `cloudflare.com{code.toLowerCase()}.svg`;

let currentTeam = -1;
let stats = {};

// Ссылка на ваш рабочий Google Apps Script
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzPSDY3YX3ptXjfXG5QSejj9KhbSmYSspXf9iBkgxEAB4JFZZ--L_2UVdaQ6zqv_Ykk/exec';

async function loadStats() {
  try {
    const res = await fetch(SCRIPT_URL);
    stats = await res.json();
    renderGrid();
  } catch (e) {
    console.error("Ошибка загрузки данных:", e);
    renderGrid();
  }
}

function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  TEAMS.forEach((team, i) => {
    const s = stats[i] || {bless:0, curse:0};
    grid.innerHTML += `
      <div class="card" onclick="openDetail(${i})">
        <img src="${FLAGS(CODES[i])}" onerror="this.onerror=null; this.src='flagcdn.com';">
        <div class="name">${team}</div>
        <div class="counters">
          <span class="gold">🙏${s.bless||0}</span>
          <span class="red">🧿${s.curse||0}</span>
        </div>
      </div>`;
  });
}

function openDetail(i) {
  currentTeam = i;
  document.getElementById('home').style.display = 'none';
  document.getElementById('detail').style.display = 'block';
  updateDetail();
}

function closeDetail() {
  document.getElementById('home').style.display = 'block';
  document.getElementById('detail').style.display = 'none';
}

function updateDetail() {
  const s = stats[currentTeam] || {bless:0, curse:0};
  document.getElementById('dflag').src = FLAGS(CODES[currentTeam]);
  document.getElementById('dname').innerText = TEAMS[currentTeam];
  document.getElementById('dbless').innerText = s.bless||0;
  document.getElementById('dcurse').innerText = s.curse||0;
}

// Корректная функция запроса платежного инвойса у Google скрипта
async function pay(type) {
  if (!window.Telegram || !window.Telegram.WebApp) {
    alert("Пожалуйста, откройте приложение внутри Telegram");
    return;
  }

  // Показываем визуальный индикатор загрузки платежа
  if (Telegram.WebApp.showScanQrPopup) {
    Telegram.WebApp.showScanQrPopup({ text: "Создание платежа..." });
    setTimeout(() => Telegram.WebApp.closeScanQrPopup(), 1000);
  }

  try {
    // Отправляем запрос серверной части Google Apps Script на генерацию реальной платежной ссылки
    const response = await fetch(`${SCRIPT_URL}?action=get_invoice&teamId=${currentTeam}&type=${type}`);
    const data = await response.json();
    
    if (!data.invoice_url) {
      Telegram.WebApp.showAlert("Ошибка: не удалось сгенерировать инвойс. Проверьте Bot Token в Google Script.");
      return;
    }

    // Передаем полученную t.me/invoice... ссылку в интерфейс Telegram
    Telegram.WebApp.openInvoice(data.invoice_url, (status) => {
      if (status === 'paid') {
        Telegram.WebApp.showAlert("🎉 Оплата успешна! Ваш голос отправлен в базу данных.");
        if (!stats[currentTeam]) stats[currentTeam] = {bless:0, curse:0};
        stats[currentTeam][type]++;
        updateDetail();
        renderGrid();
      } else if (status === 'failed') {
        Telegram.WebApp.showAlert("❌ Ошибка при проведении платежа Stars.");
      }
    });

  } catch (error) {
    console.error("Ошибка шлюза платежей:", error);
    Telegram.WebApp.showAlert("Сервер базы данных временно недоступен.");
  }
}

// Автообновление раз в 20 секунд для снижения лимитов Google квот
setInterval(loadStats, 20000);
loadStats();
</script>
</body>
</html>
